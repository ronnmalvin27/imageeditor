<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Accessory Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Image Accessory Editor</h1>

    <!-- Image upload -->
    <input type="file" id="upload" accept="image/*">

    <!-- Accessories -->
    <div id="accessory-container">
        <img src="hat.png" class="accessory" alt="Hat">
        <img src="glasses.png" class="accessory" alt="Glasses">
        <img src="beard.png" class="accessory" alt="Beard">
    </div>

    <!-- Canvas -->
    <canvas id="canvas" width="500" height="500"></canvas>

    <!-- Buttons -->
    <div>
        <button id="undoBtn">Undo</button>
        <button id="downloadBtn">Download</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
