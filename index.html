<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Accessory App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Photo Accessory App</h1>

  <div class="container">
    <input type="file" id="upload" accept="image/*">

    <div class="canvas-container">
      <canvas id="canvas"></canvas>
    </div>

    <div class="buttons">
      <button id="undoBtn">Undo</button>
      <button id="downloadBtn">Download</button>
    </div>

    <div class="accessories">
      <img src="hat.jpg" class="accessory" id="hat" draggable="true">
      <img src="glassess.png" class="accessory" id="glasses" draggable="true">
      <img src="blond.png" class="accessory" id="blond" draggable="true">
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
